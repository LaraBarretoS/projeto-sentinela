<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Médico - Prontuário Eletrônico</title>
    <link rel="stylesheet" href="/css/medico.css">
</head>
<body>

    <div class="dashboard">
        <div class="sidebar">
            <h3>📥 Pacientes Aguardando</h3>
            <div id="listaTriagens">Carregando fila...</div>
        </div>

        <div class="main-content">
            <h2>📋 Atendimento Médico / Prontuário</h2>

            <div id="boxDadosTriagem" class="dados-triagem-box">
                <strong style="color: #2c5282; display:block; margin-bottom: 5px;">⚠️ Dados da Triagem Recente:</strong>
                <p id="infoTriagemSintoma"></p>
                <p id="infoTriagemObs"></p>
            </div>

            <div class="form-group">
                <label for="paciente">Paciente Selecionado</label>
                <input id="paciente" placeholder="Clique em um paciente da fila de espera" readonly>
            </div>

            <div class="form-group">
                <label for="diagnostico">Diagnóstico / Hipótese Diagnóstica</label>
                <input id="diagnostico" placeholder="Ex: Amigdalite Bacteriana, Crise Hipertensiva...">
            </div>

            <div class="form-group">
                <label for="medicacao">Prescrição Médica / Medicações</label>
                <textarea id="medicacao" placeholder="Ex: Amoxicilina 500mg - Tomar 1 cp de 8h em 8h por 7 dias. Dipirona 1g se dor..."></textarea>
            </div>

            <div class="form-group">
                <label for="obs">Orientações ao Paciente / Observações</label>
                <textarea id="obs" placeholder="Ex: Retornar se houver piora ou febre persistente por mais de 48h. Repouso..."></textarea>
            </div>

            <button onclick="salvarConsulta()">Finalizar Atendimento e Liberar Paciente</button>
        </div>
    </div>

    <script>
        // Carrega a lista de pacientes triados
        function carregarFilaMedica() {
            fetch("/triagens")
            .then(r => r.json())
            .then(triagens => {
                const container = document.getElementById("listaTriagens");
                container.innerHTML = "";

                if (triagens.length === 0) {
                    container.innerHTML = "<p style='color: #718096; font-size: 14px; text-align: center; margin-top: 10px;'>Nenhum paciente aguardando atendimento clínico.</p>";
                    return;
                }

                // Organiza para colocar os de risco VERMELHO no topo da fila automaticamente!
                triagens.sort((a, b) => {
                    const pesos = { vermelho: 3, amarelo: 2, verde: 1 };
                    return (pesos[b.risco] || 0) - (pesos[a.risco] || 0);
                });

                triagens.forEach(t => {
                    const classeBorda = `border-${t.risco}`;
                    const classeBadge = `badge-${t.risco}`;
                    
                    // Formata o nome do sintoma para exibição limpa
                    const sintomaFormatado = t.sintoma.replace("_", " ");

                    container.innerHTML += `
                        <div class="card-triagem ${classeBorda}" onclick="selecionarPaciente('${t.nome}', '${sintomaFormatado}', '${t.temperatura}', '${t.alergia || 'Nenhuma'}', '${t.observacao || 'Sem notas'}')">
                            <h4>${t.nome}</h4>
                            <p><b>Temp:</b> ${t.temperatura}°C | <b>Alergias:</b> ${t.alergia || 'Não'}</p>
                            <p><b>Sintoma:</b> <span style="text-transform: capitalize;">${sintomaFormatado}</span></p>
                            <span class="badge-risco ${classeBadge}">${t.risco}</span>
                        </div>
                    `;
                });
            })
            .catch(err => console.error("Erro ao carregar triagens:", err));
        }

        // Quando o médico clica no card, preenche a tela
        function selecionarPaciente(nome, sintoma, temperatura, alergia, observacao) {
            document.getElementById("paciente").value = nome;
            
            // Exibe e preenche a caixinha com o resumo da triagem da enfermagem
            const box = document.getElementById("boxDadosTriagem");
            box.style.display = "block";
            document.getElementById("infoTriagemSintoma").innerHTML = `<b>Queixa Principal:</b> ${sintoma} (${temperatura}°C) | <b>Alergia:</b> <span style="color:#e53e3e; font-weight:bold;">${alergia}</span>`;
            document.getElementById("infoTriagemObs").innerHTML = `<b>Notas da Enfermagem:</b> <i>"${observacao}"</i>`;

            // Foca o cursor direto no campo de diagnóstico para poupar cliques ao médico
            document.getElementById("diagnostico").focus();
        }

        // Salva a consulta e faz o paciente sumir
        function salvarConsulta() {
            const paciente = document.getElementById("paciente").value;
            const diagnostico = document.getElementById("diagnostico").value;
            const medicacao = document.getElementById("medicacao").value;
            const obs = document.getElementById("obs").value;

            if(!paciente) {
                alert("Por favor, selecione um paciente na fila de espera antes de salvar!");
                return;
            }

            if(!diagnostico) {
                alert("Por favor, preencha o diagnóstico do paciente.");
                return;
            }

            fetch("/consulta", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ paciente, diagnostico, medicacao, obs })
            })
            .then(r => {
                if(!r.ok) throw new Error("Erro no servidor ao salvar consulta.");
                return r.json();
            })
            .then(data => {
                alert("Atendimento finalizado com sucesso! Paciente liberado.");
                
                // Limpa completamente a tela de prontuário
                document.getElementById("paciente").value = "";
                document.getElementById("diagnostico").value = "";
                document.getElementById("medicacao").value = "";
                document.getElementById("obs").value = "";
                document.getElementById("boxDadosTriagem").style.display = "none";
                
                // Recarrega a fila imediatamente (o paciente terá sumido devido ao novo filtro do backend)
                carregarFilaMedica();
            })
            .catch(err => {
                console.error(err);
                alert("Erro ao encerrar consulta: " + err.message);
            });
        }

        // Inicia e atualiza a fila automaticamente a cada 10 segundos
        carregarFilaMedica();
        setInterval(carregarFilaMedica, 10000);
    </script>
</body>
</html>
