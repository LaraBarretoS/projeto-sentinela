<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/frontend/css/atendimento.css">
</head>
<body>

    <div class="container">
        <h2>Atendimento</h2>    

        <input id="nome" placeholder="Nome">
        <input id="cpf" placeholder="CPF">

        <select id="tipo">
            <option>Convenio</option>
            <option>Particular</option>
        </select>

        <input type="file" id="foto">

        <button onclick="cadastrar()">Cadastrar</button>
    </div>

    <script>
        function cadastrar(){
            // CORRIGIDO: Rota relativa mudada para "/atendimentos" conforme o backend
            fetch("/atendimentos",{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify({
                    nome: nome.value,
                    cpf: cpf.value,
                    tipo: tipo.value
                })
            })
            .then(r => {
                if(r.ok) {
                    alert("Paciente enviado para triagem");
                    nome.value = "";
                    cpf.value = "";
                } else {
                    alert("Erro ao cadastrar paciente.");
                }
            })
            .catch(err => console.error(err));
        }
    </script>
</body>
</html>
